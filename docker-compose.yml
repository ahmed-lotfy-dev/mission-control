services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    environment:
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:+${NVIDIA_API_KEY}}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:+${OPENROUTER_API_KEY}}
      GEMINI_API_TOKEN: ${GEMINI_API_TOKEN:+${GEMINI_API_TOKEN}}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:+${CLOUDFLARE_API_TOKEN}}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:+${CLOUDFLARE_ACCOUNT_ID}}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:+${R2_ACCESS_KEY_ID}}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:+${R2_SECRET_ACCESS_KEY}}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:+${R2_BUCKET_NAME}}
      DATABASE_URL: ${DATABASE_URL:+${DATABASE_URL}}
      DB_PATH: /data/mission-control.db
    expose:
      - "3000"
    volumes:
      - mission-control-data:/data

volumes:
  mission-control-data: